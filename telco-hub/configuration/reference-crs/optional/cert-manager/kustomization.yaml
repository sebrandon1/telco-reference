---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - certManagerNS.yaml
  - certManagerOperatorgroup.yaml
  - certManagerSubscription.yaml
  - certManagerClusterIssuer.yaml
  # Alternative issuers for disconnected environments (comment out ACME issuer above and enable the matching set):
  # Self-signed bootstrap set (uncomment all three):
  # - certManagerClusterIssuerSelfSigned.yaml
  # - certManagerRootCACertificate.yaml
  # - certManagerClusterIssuerCA.yaml
  - ingressCertificate.yaml
  - ingressControllerConfig.yaml
  - apiServerCertificate.yaml
  - apiServerConfig.yaml
  - certManagerCertificatePolicy.yaml
  - certManagerCertificatePolicyPlacement.yaml
  - certManagerCertificatePolicyPlacementBinding.yaml
  # Hub-Spoke CA trust (uncomment when using custom CAs):
  # - certManagerSpokeCATrustCM.yaml
  # - certManagerHubCATrustPolicy.yaml
  # - certManagerHubCATrustPolicyPlacement.yaml
  # - certManagerHubCATrustPolicyPlacementBinding.yaml
  # Root CA expiration monitoring (uncomment when using custom CAs):
  # - certManagerRootCAExpirationPolicy.yaml
  # - certManagerRootCAExpirationPolicyPlacement.yaml
  # - certManagerRootCAExpirationPolicyPlacementBinding.yaml
